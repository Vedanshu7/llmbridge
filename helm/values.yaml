replicaCount: 1

image:
  repository: ghcr.io/vedanshu7/llmbridge
  pullPolicy: IfNotPresent
  tag: ""  # defaults to chart appVersion

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""  # use cluster default

env:
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  COHERE_API_KEY: ""

config: |
  {
    "listen_addr": ":8080",
    "log_level": "info",
    "jwt_secret": "change-me-in-production"
  }

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llmbridge.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
