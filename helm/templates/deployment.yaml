apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmbridge.fullname" . }}
  labels:
    {{- include "llmbridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "llmbridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmbridge.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: llmbridge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server", "-config", "/etc/llmbridge/config.json", "-db", "/data/llmbridge.db"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          envFrom:
            - secretRef:
                name: {{ include "llmbridge.fullname" . }}-env
                optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/llmbridge
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: {{ include "llmbridge.fullname" . }}-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "llmbridge.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
