language: en-US
tone_instructions: "Be concise and technical. This is a Go library for LLM providers."
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!**/*.sum"
    - "!**/*.mod"
  path_instructions:
    - path: "llms/**"
      instructions: "Check that the provider implements base.LLM correctly. Verify Complete() sets resp.Provider and resp.Usage. Check that CostForResponse is wired into cost_calculator.go."
    - path: "**/*_test.go"
      instructions: "Verify no real API calls are made. Tests must use httptest or mocks only."
    - path: ".github/**"
      instructions: "Skip detailed review — CI/config changes."
chat:
  auto_reply: true
