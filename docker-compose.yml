services:
  llmbridge:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - COHERE_API_KEY
      - GEMINI_API_KEY
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
    volumes:
      - ./config.json:/config.json:ro
      - llmbridge_data:/data
    command: ["server", "-config", "/config.json", "-db", "/data/llmbridge.db"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  llmbridge_data:
