name: Socket Security

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  socket:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Socket Security Check
        uses: SocketDev/socket-security-action@v2
        with:
          api-key: ${{ secrets.SOCKET_SECURITY_API_KEY }}
