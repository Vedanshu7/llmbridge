name: Benchmark

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=3 ./... | tee benchmark.txt

      - name: Post benchmark results
        uses: actions/github-script@v9
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('benchmark.txt', 'utf8');
            if (!results.includes('Benchmark')) {
              console.log('No benchmarks found, skipping comment');
              return;
            }
            const body = `## Benchmark Results\n\`\`\`\n${results}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
